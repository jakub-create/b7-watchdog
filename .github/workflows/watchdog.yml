name: B7 marketplace watchdog

# Spolehlivý běh bez závislosti na (nespolehlivém) GitHub cronu:
# jedna úloha běží souvisle ~5,5 h a uvnitř kontroluje tržiště každých INTERVAL
# sekund. Než jí vyprší čas, sama nastartuje další běh (řetězení) -> nepřetržitý
# provoz. Když by řetěz spadl, obnoví ho pojistka v keepalive.yml.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Režim běhu"
        type: choice
        default: watch
        options: [watch, testmail, discovery]

permissions:
  contents: write      # commit aktualizovaného stavu (state/seen.json)

concurrency:
  group: watchdog      # nikdy neběží dvě smyčky najednou
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # < 6h hard limit GitHubu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Watch loop
        env:
          MODE: ${{ inputs.mode || 'watch' }}
          INTERVAL: "300"          # kontrola každých 5 minut
          LOOP_BUDGET: "19800"     # 5,5 h, pak řetěz předá štafetu
          B7_EMAIL: ${{ secrets.B7_EMAIL }}
          B7_PASSWORD: ${{ secrets.B7_PASSWORD }}
          B7_RACE_ID: ${{ vars.B7_RACE_ID }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # testmail / discovery: jen jednou a konec (žádná smyčka).
          if [ "$MODE" != "watch" ]; then
            python watchdog.py
            exit 0
          fi

          end=$(( SECONDS + LOOP_BUDGET ))
          while [ "$SECONDS" -lt "$end" ]; do
            python watchdog.py || echo "watchdog.py selhalo, pokračuji dál"
            if [ -n "$(git status --porcelain state/)" ]; then
              git add state/
              git commit -q -m "Update watchdog state [skip ci]"
              git pull --rebase --autostash -q origin main || true
              git push -q || echo "push selhal, zkusím příště"
            fi
            sleep "$INTERVAL"
          done

      # Štafeta: spustí další smyčku. Potřebuje PAT (DISPATCH_TOKEN) – běžný
      # GITHUB_TOKEN by nový běh kvůli ochraně proti rekurzi nespustil.
      - name: Chain next loop
        if: always() && (inputs.mode == 'watch' || inputs.mode == '')
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: gh workflow run watchdog.yml --repo "${{ github.repository }}"
