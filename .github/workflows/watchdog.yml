name: B7 marketplace watchdog

# Krátký jednorázový běh (normální použití Actions). Spolehlivé časování zajišťuje
# externí služba (cron-job.org), která tenhle workflow spouští přes API každých pár
# minut. `schedule` níže je jen řídká záloha, kdyby externí časovač vypadl.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Režim běhu"
        type: choice
        default: watch
        options: [watch, testmail, discovery]
  schedule:
    - cron: "0 */6 * * *"   # záloha: cca 4× denně (kdyby externí časovač vypadl)

permissions:
  contents: write           # commit aktualizovaného stavu (state/seen.json)

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run watchdog
        env:
          MODE: ${{ inputs.mode || 'watch' }}
          RESERVE_MODE: live            # OSTRÁ auto-rezervace nové nabídky (buyOffer) – platba zůstává na uživateli
          RESERVE_MAX_PRICE: "0"        # 0 = bez cenového stropu (rezervovat za jakoukoli cenu)
          B7_EMAIL: ${{ secrets.B7_EMAIL }}
          B7_PASSWORD: ${{ secrets.B7_PASSWORD }}
          B7_RACE_ID: ${{ vars.B7_RACE_ID }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
        run: python watchdog.py

      - name: Persist state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update watchdog state [skip ci]"
            git pull --rebase --autostash -q origin main || true
            git push
          else
            echo "No state change."
          fi
